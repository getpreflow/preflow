name: Monorepo Split

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  GIT_AUTHOR_NAME: "Preflow Bot"
  GIT_AUTHOR_EMAIL: "bot@getpreflow.dev"
  GIT_COMMITTER_NAME: "Preflow Bot"
  GIT_COMMITTER_EMAIL: "bot@getpreflow.dev"

concurrency:
  group: monorepo-split
  cancel-in-progress: false

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { local: 'packages/auth', remote: 'auth' }
          - { local: 'packages/core', remote: 'core' }
          - { local: 'packages/routing', remote: 'routing' }
          - { local: 'packages/view', remote: 'view' }
          - { local: 'packages/components', remote: 'components' }
          - { local: 'packages/data', remote: 'data' }
          - { local: 'packages/htmx', remote: 'htmx' }
          - { local: 'packages/i18n', remote: 'i18n' }
          - { local: 'packages/testing', remote: 'testing' }
          - { local: 'packages/devtools', remote: 'devtools' }
          - { local: 'packages/skeleton', remote: 'skeleton' }
          - { local: 'packages/twig', remote: 'twig' }
          - { local: 'packages/blade', remote: 'blade' }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "Preflow Bot"
          git config --global user.email "bot@getpreflow.dev"

      - name: Install splitsh-lite
        run: |
          curl -L https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar xz
          chmod +x splitsh-lite
          sudo mv splitsh-lite /usr/local/bin/

      - name: Split and push branch
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          # Remove the default GITHUB_TOKEN extraheader so our PAT is used
          git config --unset-all http.https://github.com/.extraheader || true

          # Generate the split SHA for this package
          SHA=$(splitsh-lite --prefix=${{ matrix.package.local }} --target=refs/heads/split-branch)

          # Push to the split repo using PAT
          git remote add split "https://x-access-token:${SPLIT_TOKEN}@github.com/getpreflow/${{ matrix.package.remote }}.git"
          git push split ${SHA}:refs/heads/main -f

      - name: Split and push tag
        if: github.ref_type == 'tag'
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          SHA=$(splitsh-lite --prefix=${{ matrix.package.local }} --target=refs/tags/${{ github.ref_name }})
          git push split ${SHA}:refs/tags/${{ github.ref_name }} -f
